<!doctype html>
<html lang="en" class="h-full">
  <head>
    <!-- Set canonical to app.r10progress.com -->
    <link rel="canonical" href="https://app.r10progress.com" />
    <link rel="manifest" href="manifest.json" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      R10Progress - Analyze Your Golf Shots with Garmin Approach R10 Radar
    </title>

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Upload data from Garmin Approach R10 Radar, analyze your golf shots over time and sessions with R10Progress."
    />
    <meta
      name="keywords"
      content="Garmin Approach R10, golf shots, golf analysis, R10Progress, golf sessions"
    />
    <meta name="author" content="Your Name" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="R10Progress - Analyze Your Golf Shots with Garmin Approach R10 Radar"
    />
    <meta
      property="og:description"
      content="Upload data from Garmin Approach R10 Radar, analyze your golf shots over time and sessions with R10Progress."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="R10Progress - Analyze Your Golf Shots with Garmin Approach R10 Radar"
    />
    <meta
      property="twitter:description"
      content="Upload data from Garmin Approach R10 Radar, analyze your golf shots over time and sessions with R10Progress."
    />

    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var systemDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        // Match useDarkMode: dark when explicit, or when theme is system/missing and OS is dark
        var dark =
          t === "dark" || ((t === "system" || t === null) && systemDark);
        if (dark) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <script
      defer
      data-domain="r10progress.com"
      data-api="/api/wildflower/event"
      src="/api/wildflower/script.outbound-links.tagged-events.js"
    ></script>
  </head>
  <body class="h-full bg-white dark:bg-gray-900 dark:text-white">
    <div id="root" />

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
